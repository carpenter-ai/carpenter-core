# RULE: tokens and secrets belong here (loaded via .env or env vars), NOT in config.yaml.
# config.yaml is checked into version control patterns and shared; .env is chmod 600 / gitignored.

UI_TOKEN:
  config_key: ui_token
  description: "Bearer token for web UI access (empty = no auth enforced)"

ANTHROPIC_API_KEY:
  config_key: claude_api_key
  description: "Anthropic API key for Claude models"
  required_when:
    ai_provider: anthropic

TINFOIL_API_KEY:
  config_key: tinfoil_api_key
  description: "Tinfoil API key for secure enclave inference"
  required_when:
    ai_provider: tinfoil

TLS_KEY_PASSWORD:
  config_key: tls_key_password
  description: "Password for encrypted TLS private key"

GIT_TOKEN:
  config_key: git_token
  description: "Git server API token for git operations"

FORGEJO_TOKEN:
  config_key: git_token
  description: "Deprecated alias for GIT_TOKEN — Forgejo API token for git operations"

TELEGRAM_BOT_TOKEN:
  config_key: telegram_bot_token
  description: "Telegram Bot API token from @BotFather (read directly by connector via env var)"

GIT_AUTHOR_NAME:
  config_key: git_author_name
  description: "Git author name for commits"

GIT_AUTHOR_EMAIL:
  config_key: git_author_email
  description: "Git author email for commits"

GIT_COMMITTER_NAME:
  config_key: git_committer_name
  description: "Git committer name for commits"

GIT_COMMITTER_EMAIL:
  config_key: git_committer_email
  description: "Git committer email for commits"
