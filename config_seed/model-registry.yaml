    capabilities: [chat]
    description: "Gemma 2 2B (~3-5 tok/s on Pi5)"
    hf_repo: google/gemma-2-2b-it-GGUF
    gguf_filename: gemma-2-2b-it-q4_k_m.gguf
    download_size_mb: 1600

  qwen2.5-3b-q4:
