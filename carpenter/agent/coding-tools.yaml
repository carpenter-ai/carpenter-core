# Coding agent workspace tools.
#
# These tools are used by the built-in coding agent during its
# workspace edit loop. They operate on relative paths within an
# isolated workspace directory.
#
# Coding agents do NOT have bash/shell access. They operate purely
# through file read/write/edit operations and a list_files tool.
#
# Unlike the chat tools in config_seed/tools/, these are NOT loaded by
# the chat tool selector. They are loaded by coding_agent.py at
# runtime and sent directly to the LLM API.
#
# To customize, copy this file to {base_dir}/config/coding-tools.yaml
# and edit. The coding agent checks the user config directory first.

tools:
  - name: read_file
    description: Read the contents of a file. Path is relative to the workspace root.
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: Relative path to the file to read.
      required:
        - path

  - name: write_file
    description: Write content to a file. Creates the file and parent directories if they don't exist.
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: Relative path to the file to write.
        content:
          type: string
          description: The content to write to the file.
      required:
        - path
        - content

  - name: edit_file
    description: Find and replace text in a file. Fails if old_text is not found exactly once.
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: Relative path to the file to edit.
        old_text:
          type: string
          description: The exact text to find and replace.
        new_text:
          type: string
          description: The replacement text.
      required:
        - path
        - old_text
        - new_text

  - name: list_files
    description: List files and directories at the given path relative to workspace root. Returns a tree-like listing. Use '.' or omit path to list the workspace root.
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: Relative path to the directory to list. Defaults to workspace root.
          default: "."
      required: []
