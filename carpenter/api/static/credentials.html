<!DOCTYPE html>
<html>
<head>
    <title>Credential: {label}</title>
    <style>{css}</style>
</head>
<body>
    <div class="header">
        <h2>Provide Credential</h2>
    </div>
    {desc_html}
    <form onsubmit="submitCred(event)">
        <label for="credential">{label}</label>
        <input type="password" id="credential" name="credential"
               autocomplete="off" required placeholder="Paste your token here">
        <br>
        <button type="submit" class="btn">Submit</button>
    </form>
    <p class="note">This is a one-time link. The value is stored securely and
    never shown in chat.</p>
    <script>{js}</script>
</body>
</html>
